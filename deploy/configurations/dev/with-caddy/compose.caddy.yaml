
services:
  web:
    container_name: 'caddy'
    image: caddy
    ports:
      - "8080:80"
      - "8443:443"
      - "8443:443/udp"
    env_file:
      - .env.caddy
    volumes:
      - $PWD/conf:/etc/caddy
      - caddy_configuration:/config
      - caddy_data:/data

volumes:
  caddy_data:
    driver: 'local'
  caddy_configuration:
    driver: 'local'
